<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Air Instruments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a14;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }
    h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
    p { color: rgba(255,255,255,0.5); font-size: 15px; }
    .instruments {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .instrument-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 32px 40px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      text-decoration: none;
      color: #e8e8f0;
      transition: all 0.2s;
      min-width: 180px;
    }
    .instrument-card:hover {
      background: rgba(0, 212, 255, 0.08);
      border-color: rgba(0, 212, 255, 0.3);
      transform: translateY(-2px);
    }
    .instrument-card .icon { font-size: 48px; }
    .instrument-card .name { font-size: 18px; font-weight: 600; }
    .instrument-card .status {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .instrument-card .status.live { color: #00ff88; }
    .coming-soon { opacity: 0.4; pointer-events: none; }
  </style>
</head>
<body>
  <div>
    <h1>Air Instruments</h1>
    <p>Play instruments with your webcam</p>
  </div>
  <div class="instruments">
    <a href="/guitar/" class="instrument-card">
      <span class="icon">🎸</span>
      <span class="name">Guitar</span>
      <span class="status live">Live</span>
    </a>
    <div class="instrument-card coming-soon">
      <span class="icon">🎻</span>
      <span class="name">Violin</span>
      <span class="status">Coming soon</span>
    </div>
    <div class="instrument-card coming-soon">
      <span class="icon">🥁</span>
      <span class="name">Drums</span>
      <span class="status">Coming soon</span>
    </div>
  </div>
</body>
</html>
